kind = "web"
previewPath = "/"
title = "JetFix Dispatch"
version = "1.0.0"
id = "artifacts/jetfix-dispatch"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23017

[services.development]
run = "pnpm --filter @workspace/jetfix-dispatch run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jetfix-dispatch", "run", "build" ]
publicDir = "artifacts/jetfix-dispatch/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23017"
BASE_PATH = "/"
